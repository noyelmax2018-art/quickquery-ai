<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0b10"/>
      <stop offset="45%" stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#07070d"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="-10%" r="70%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="95%" cy="100%" r="55%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.35"/>
      <stop offset="65%" stop-color="#d946ef" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <g filter="url(#blur)">
    <circle cx="600" cy="80" r="220" fill="#6366f1" opacity="0.25"/>
    <circle cx="1040" cy="560" r="180" fill="#d946ef" opacity="0.18"/>
  </g>

  <g font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" fill="#fff">
    <text x="90" y="265" font-size="64" font-weight="700" fill="#ffffff">QuickQuery AI</text>
    <text x="90" y="330" font-size="30" font-weight="400" fill="#d4d4d8">Premium, fast, concise answers — without the noise.</text>

    <g transform="translate(90 375)">
      <rect x="0" y="0" rx="18" ry="18" width="360" height="54" fill="#ffffff" fill-opacity="0.08" stroke="#ffffff" stroke-opacity="0.12"/>
      <text x="20" y="35" font-size="22" fill="#e5e7eb">Ask anything. Get it in seconds.</text>
    </g>

    <text x="90" y="560" font-size="18" fill="#a1a1aa">quickquery-ai.pages.dev</text>
  </g>
</svg>
